missions.assistant.busy=Thinking…
missions.assistant.error=Could not reach the assistant. Try again.
missions.assistant.guide=• Step 1 — Align title, site, dates, status, lead, and purpose text with the official order.\n• Step 2 — Capture duration, departure/return, transport, and who bears expenses.\n• Step 3 — Each agent appears once (Messieurs or Mesdames); the lead is added automatically if omitted.\n• Step 4 — Internal notes stay optional.\n• Step 5 — Reference, issue date, and signatory refine the generated DOCX.
missions.assistant.topic.empty=Welcome. Ask a specific question about the form (transport, dates, purpose…) or use a suggestion chip below.
missions.assistant.topic.generic=I can answer precisely if you name the topic:\n• multi-leg transport and itinerary,\n• consistency of dates, site, and duration wording,\n• wording of the mission purpose / official order,\n• participants or expenses,\n• official reference and signatory.\nAsk in one sentence or tap a suggestion.
missions.assistant.topic.transport.reply=For multi-leg trips, “Transport & itinerary” should let a reader follow the route without guessing.\n\nDescribe chronologically:\n• departure place and day (or time window),\n• each intermediate stop: city/site, short reason (control, meeting, support…),\n• final location or planned return,\n• main means: service vehicle, public transport, authorised taxi, etc.\n• mention multiple vehicles or drivers if relevant.\n\n“Departure note” and “Return note” can carry rendezvous times without repeating everything.\n\nTip: one line per leg or a numbered list stays readable on the generated order.
missions.assistant.prefill.transportDetail.template=Multi-leg mission — indicative route (adapt to your official order):\n\n1) Departure: {0} — on {1}\n2) Intermediate stop(s): (city/site, short reason, time window if known)\n3) Main execution linked to site: {0}\n4) Planned return: on {2}\n\nMeans: service vehicle / public transport / other (specify).\nEquipment hand-back / shuttle: (complete if relevant).
missions.assistant.prefill.departureNote.template=Rendezvous / departure planned on {0} (add time and pick-up point).
missions.assistant.prefill.returnNote.template=Return planned on {0} (add time and closing location).
missions.assistant.topic.dates.intro=Quick checks on what you entered:
missions.assistant.topic.dates.badOrder=Warning: end date ({1}) is before start date ({0}). Fix both fields so the chronology makes sense.
missions.assistant.topic.dates.okRange=From {0} to {1} spans {2} calendar day(s) inclusive. Confirm this matches the mission you intend.
missions.assistant.prefill.durationNote.fromDates=Indicative duration: {0} calendar day(s) from start through end inclusive. Adjust if you mean working days only or partial coverage.
missions.assistant.topic.dates.durationHint=If the mission spans multiple days, add a clear phrase under “Duration note” (e.g. “3 working days” or “week of …”).
missions.assistant.topic.dates.needOtherDate=Only one of start/end is filled in—provide both dates (for a single-day mission you may duplicate the same date).
missions.assistant.topic.dates.needDates=Enter both start and end dates to review consistency with site and duration wording.
missions.assistant.topic.dates.siteMissing=Main site is empty—fill it so the mission is identifiable on the order.
missions.assistant.topic.dates.siteHint=“Site” should reflect the primary execution location; other stops belong mainly in transport / notes.
missions.assistant.topic.dates.durationProvided=Your current duration note: “{0}”—make sure it matches the dates and how people are deployed on the ground.
missions.assistant.topic.subject.reply=The mission purpose should summarise operational intent in one or two sentences: activity type (control, coordination…), useful scope, and hierarchy only when known.\n\nStay aligned with title and site; avoid opaque internal jargon.\n\nPossible skeleton: “Field mission regarding […], for […], covering [start] to [end].”—replace with real facts (do not invent chains of command).
missions.assistant.prefill.objectives.template=Field mission for {1}, regarding {0}, from {2} through {3}. (Specify activity type and expected outcomes.)
missions.assistant.topic.participants.reply=Practical rule: each officer appears once—pick Messieurs or Mesdames labels exactly like the official roster.\n\nThe mission lead is added automatically if omitted; still verify consistency with signatures and order wording.\n\nFor large teams, mirror the roster order expected by your office; internal notes can clarify roles if needed.
missions.assistant.topic.expenses.reply=Spell out who pays for what: transport, lodging, mileage, meals, advances…\n\nMention caps or internal rules (“submit expenses after signed order”) briefly if they matter.\n\nIf the signed order already covers costs, point to it explicitly (“as stated in order …”).
missions.assistant.prefill.expensesNote.template=Travel & incidental expenses handled according to applicable rules and the signed mission order frame (adapt to your dossier).
missions.assistant.topic.orderMeta.reply=Reference, issue date, and signatory align the generated DOCX with the administrative act.\n\nCopy the reference printed on letterhead faithfully. Issue date should match the signature; signatory is whoever commits the organisation.\n\nOrder body text can echo or extend the main mission purpose captured above.
missions.assistant.offlineBanner=Offline smart assistant: answers and suggestions depend on your question (transport, dates, purpose…). Live OpenAI chat is not configured on this server.
missions.assistant.adminHint=Optional: administrators can enable live AI by setting sysco.assistant.openai-api-key (and optional sysco.assistant.openai-model).
missions.assistant.aiUnavailableNotice=Live AI could not be reached just now; here is the mission checklist instead.
