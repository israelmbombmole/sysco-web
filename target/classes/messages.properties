tour.step.welcome.title=Welcome to SYSCO Web
tour.step.welcome.body=<strong>What SYSCO Web is:</strong> a web application where your team records and tracks operational work — cases (“tickets”), physical courier items, data, file exchanges, missions, schedules, and more — so that work is visible, traceable, and shared with the right people.<br><br><strong>What this tour does:</strong> it explains the main screen, then <em>each menu module you are allowed to see</em>: what that module is <em>for</em>, what the system <em>does</em> there, and what you <em>typically</em> do as a user. Your exact buttons may vary slightly by role.<br><br><strong>Tip:</strong> restart anytime with the <strong>(i)</strong> help button in the top bar.
tour.step.header.title=Top bar (header)
tour.step.header.body=<strong>What it is for:</strong> quick access to alerts and identity, without opening a full module.<br><br><strong>What each control does:</strong><br>• <strong>Help (i)</strong> — starts this guided tour.<br>• <strong>Notifications</strong> — lists system messages (e.g. ticket updates, chat, reminders). Opening an item often takes you to the related work.<br>• <strong>Chat</strong> — internal conversations; useful for quick coordination (official decisions should still be reflected on the ticket or document).<br>• <strong>Your name</strong> — shows which account is active; always verify before acting on sensitive data.<br><br><strong>Important:</strong> use <strong>Log out</strong> in the sidebar on shared PCs so the next person cannot work under your name.
tour.step.sidebar.title=Module menu (sidebar)
tour.step.sidebar.body=<strong>What it is for:</strong> this is the map of all <strong>business areas</strong> (modules) in SYSCO Web. Each line opens a different part of the system.<br><br><strong>What the system does:</strong> only shows modules your administrator allowed for your <em>role</em> and <em>permissions</em>. That is why your menu can differ from a colleague’s — it is intentional, not a bug.<br><br><strong>How to use it:</strong> click a name to open that module; the current page is highlighted. The following tour steps describe <strong>every link you see here</strong> in detail: purpose, main actions, and who usually needs that module.
tour.step.help.title=Help and guided tour
tour.step.help.body=<strong>What this button does:</strong> runs the guided tour again from the start — useful after training or when you forget what a module is for.<br><br><strong>What you will see:</strong> for each step, a panel explains the highlighted area. Module steps describe <strong>what the module is about</strong>, <strong>what the application does in that area</strong>, and <strong>concrete tasks</strong> users perform.<br><br><strong>Note:</strong> finishing or closing the tour may mark onboarding as completed for your user (depending on your organisation).

tour.mod.generic=<strong>About this module:</strong> this entry is a SYSCO <strong>business domain</strong> — a separate area of the application dedicated to one kind of work (for example data, cases, or mail).<br><br><strong>What the system does here:</strong> it stores, lists, and processes information for that domain: forms, tables, searches, and workflows defined by your organisation.<br><br><strong>What you do as a user:</strong> open it from the menu, then use the screens inside to create, view, or update records according to your procedures. Filters and buttons depend on your permissions (some people only read; others can edit).<br><br><strong>Tip:</strong> if you are unsure which module to use, ask your supervisor which process maps to this menu name.
tour.mod.dashboard=<strong>About this module:</strong> the <strong>Dashboard</strong> is your <em>home page</em> after login. It is meant to give a fast overview — not to replace detailed lists elsewhere.<br><br><strong>What the system does here:</strong> aggregates indicators and shortcuts (counts, highlights, links) so you can see at a glance whether workload, deadlines, or specific areas need attention. The exact tiles depend on configuration and your access.<br><br><strong>What you do as a user:</strong> start here each day; scan for alerts or KPIs; click through to <strong>My work</strong>, <strong>Tickets</strong>, <strong>Courier</strong>, or other modules when you need full detail or to act on a case.<br><br><strong>How it differs from other modules:</strong> it summarises; <strong>Ticket management</strong> or <strong>Courier</strong> hold the full dossiers and actions.
tour.mod.dataEntry=<strong>About this module:</strong> <strong>Data entry</strong> is for <em>structured operational data</em> — facts and figures your institution must capture in a consistent format (declarations, controls, statistics, registers, etc.).<br><br><strong>What the system does here:</strong> presents data as rows and columns (or similar), validates mandatory fields and formats, and stores each record in the database so it can be reported and audited. Files can often be attached to a row when the process requires proof.<br><br><strong>What you do as a user:</strong> create new lines, correct mistakes under your authority, save changes, and sometimes import batches from an approved spreadsheet template. Always use the official template and read validation errors — they prevent bad data for the whole service.<br><br><strong>How it differs:</strong> day-to-day typing is here; large clean-up and imports are often in <strong>Data management</strong>.
tour.mod.courier=<strong>About this module:</strong> the <strong>Courier portal</strong> is for <em>physical movements</em> — envelopes, pouches, parcels, internal transfers — anything that must have a clear chain of custody like registered mail.<br><br><strong>What the system does here:</strong> records each item with references (barcode, registry number, etc.), who has it now, its status (received, in transit, delivered…), and history of handovers. The goal is that anyone authorised can answer: “Where is this packet, and who had it last?”<br><br><strong>What you do as a user:</strong> register arrivals, scan or enter identifiers, assign the next handler, confirm delivery, and add notes when something is wrong (damage, refusal, mismatch). The digital state must match reality — never mark “delivered” if the item is still on your desk.<br><br><strong>How it differs:</strong> operators use this portal; <strong>Courier management</strong> is for wider oversight and steering.
tour.mod.courierManagement=<strong>About this module:</strong> <strong>Courier management</strong> is the <em>supervisory</em> view of physical mail flows — for people responsible for smooth operations across desks or teams.<br><br><strong>What the system does here:</strong> shows broader lists, timelines, and tools to spot delays, overloads, or stuck items; allows reassignment or escalation according to your rules. It connects to the same courier data as the portal, but with a management angle.<br><br><strong>What you do as a user:</strong> monitor SLAs and ageing items, balance workload between staff, investigate incidents, and produce operational visibility for management. Typical roles: directors, inspectors, secretaries — as configured by your organisation.<br><br><strong>How it differs:</strong> field staff use <strong>Courrier</strong> for hands-on scanning; this module is for oversight and correction at scale.
tour.mod.dataManagement=<strong>About this module:</strong> <strong>Data management</strong> is for <em>governing datasets</em> — keeping master lists correct, importing batches, fixing reference tables, and reconciling data when many rows must change at once.<br><br><strong>What the system does here:</strong> supports administrative operations on data (imports, updates, possibly exports) with controls so that statistics and downstream processes stay coherent. Errors in this module can affect dashboards and reports for everyone.<br><br><strong>What you do as a user:</strong> run or supervise imports, validate samples, correct codes and naming, align data with paper or external sources, and document major changes. Usually only trained, trusted staff receive this permission.<br><br><strong>How it differs:</strong> <strong>Data entry</strong> is for routine line-by-line capture; this module is for <em>mass</em> and <em>maintenance</em> of data structures.
tour.mod.dataShare=<strong>About this module:</strong> <strong>Data share</strong> lets you send files or controlled extracts to someone else <em>through the application</em>, under your security rules — instead of uncontrolled personal email or USB sticks.<br><br><strong>What the system does here:</strong> records who shared what, with whom, often with expiry dates or one-time passwords (OTP), so access can be audited and revoked. It reduces “invisible” copies of sensitive documents.<br><br><strong>What you do as a user:</strong> create a share, choose the recipient and scope, follow policy for personal or classified data, notify the recipient through approved channels, and <strong>revoke</strong> access when the collaboration ends.<br><br><strong>How it differs:</strong> <strong>File share management</strong> and <strong>File share audit</strong> are for administrators and investigators; this module is for initiating and tracking shares as an operational user.
tour.mod.myActivity=<strong>About this module:</strong> <strong>My activity</strong> is your <em>personal journal</em> inside SYSCO — movements and actions linked to <strong>you</strong>, not the entire organisation.<br><br><strong>What the system does here:</strong> lists recent tickets, merges, or other events you participated in, so you can reconstruct “what I did last week” without searching the whole database.<br><br><strong>What you do as a user:</strong> review your trail before a handover, prepare for an audit question, or find a case you remember touching. Use it as a memory aid; official truth for a dossier is still the ticket’s own history.<br><br><strong>How it differs:</strong> <strong>My work</strong> shows what is <em>waiting for your action</em>; <strong>My activity</strong> shows what you <em>already did</em>.
tour.mod.myWork=<strong>About this module:</strong> <strong>My work</strong> is your <em>personal to-do queue</em> — tickets (and related tasks) that are assigned to you or require your decision.<br><br><strong>What the system does here:</strong> filters the mass of open cases down to “what concerns me now”, often sorted by priority, date, or status. It is the main entry point for daily processing for many officers.<br><br><strong>What you do as a user:</strong> work items from oldest or highest priority first, open the ticket, document your decision in comments, attach evidence, change status when the process allows, escalate if you are blocked, and merge duplicates if trained to do so.<br><br><strong>How it differs:</strong> <strong>Ticket monitoring</strong> sees <em>all</em> relevant cases for a team; <strong>My work</strong> sees <em>your</em> assignments first.
tour.mod.ticketMonitoring=<strong>About this module:</strong> <strong>Ticket monitoring</strong> is for <em>supervisors and leads</em> who must watch many cases at once — backlog, risk, deadlines, and escalations across a unit.<br><br><strong>What the system does here:</strong> provides filtered lists and views (status, age, priority, direction, etc.) so management can detect bottlenecks, redistribute work, or intervene before SLAs break. It is a “control tower” for ticket inventory.<br><br><strong>What you do as a user:</strong> apply filters, identify outliers (very old tickets, repeated escalations), open details when needed, and coordinate assignments or escalation paths. You see the forest; line officers often live in <strong>My work</strong> or a single ticket.<br><br><strong>How it differs:</strong> <strong>Ticket management</strong> is for deep editing of one dossier; monitoring is for <em>breadth</em> and <em>oversight</em>.
tour.mod.ticketManagement=<strong>About this module:</strong> <strong>Ticket management</strong> is the core <em>case file</em> workspace — a “ticket” is an operational dossier (control, investigation, request, etc.) with a lifecycle from opening to closure.<br><br><strong>What the system does here:</strong> stores all structured fields, free-text comments, attachments, tasks, status transitions, links to courier or other artefacts, and an audit trail of changes. It is the authoritative place for “what happened on this case” inside SYSCO.<br><br><strong>What you do as a user:</strong> open a ticket from a list, read the history, update facts, request or perform closure review, upload PDFs or scans, link related tickets, and follow your SOP for escalation. Quality of comments directly helps colleagues and audits.<br><br><strong>How it differs:</strong> <strong>Create ticket</strong> only opens new dossiers; this module handles ongoing administration and closure.
tour.mod.fileShareManagement=<strong>About this module:</strong> <strong>File share management</strong> is an <em>administrative gate</em> for sensitive file exchanges — approving who may receive what, and under which conditions.<br><br><strong>What the system does here:</strong> queues requests, records decisions (approve / deny / adjust), and maintains an administrative view of active shares. It protects the organisation from uncontrolled distribution of documents.<br><br><strong>What you do as a user:</strong> review pending requests against policy, document the justification, revoke access when appropriate, and coordinate with security or legal when in doubt. Only a narrow group should have this module.<br><br><strong>How it differs:</strong> operational users use <strong>Data share</strong>; this module is for <em>governance and approval</em>.
tour.mod.userManagement=<strong>About this module:</strong> <strong>User management</strong> controls <em>who exists in the system</em>: accounts, passwords, roles, and which modules each person may open.<br><br><strong>What the system does here:</strong> creates and disables logins, maps people to roles (director, inspector, secretary, etc.), and attaches fine permissions (read/write per domain). It is the main lever for least-privilege access.<br><br><strong>What you do as a user:</strong> onboard new staff per HR validation, reset locked passwords, adjust permissions when duties change, deactivate leavers promptly, and never share admin accounts. Every change should be traceable to a decision.<br><br><strong>Risk:</strong> mistakes here can expose personal data or operational secrets — double-check before saving.
tour.mod.agenda=<strong>About this module:</strong> the <strong>Agenda</strong> (and leave) area covers <em>time planning</em> — when people are present, on leave, or unavailable, so operations can be staffed correctly.<br><br><strong>What the system does here:</strong> depending on configuration, it may show calendars, leave requests, approvals, or team availability. It links HR reality to operational planning.<br><br><strong>What you do as a user:</strong> request absences, approve or reject as a manager, check team coverage before peak periods, and keep dates accurate so colleagues know who is reachable.<br><br><strong>Note:</strong> screens may vary; follow local instructions for public holidays and mandatory leave types.
tour.mod.loginAudit=<strong>About this module:</strong> <strong>Login audit</strong> records <em>authentication events</em> — attempts to access SYSCO Web and related metadata useful for security investigations.<br><br><strong>What the system does here:</strong> retains a tamper-evident style log (who, when, from which context where available) so that abuse, credential theft, or policy breaches can be analysed.<br><br><strong>What you do as a user:</strong> filter by user and date range, export for formal inquiries when allowed, and correlate with physical access or HR reports. Not for curiosity — access is restricted and legally sensitive.<br><br><strong>How it differs:</strong> this is about <em>connections to the application</em>; ticket history is about <em>case work</em>.
tour.mod.fileShareAudit=<strong>About this module:</strong> <strong>File share audit</strong> is the <em>investigation trail</em> for document sharing — proving who sent what to whom and when.<br><br><strong>What the system does here:</strong> centralises events linked to shares (creation, download, revocation if logged) so compliance and security can answer regulatory or internal questions.<br><br><strong>What you do as a user:</strong> run targeted searches after an incident, prepare evidence packages for audit, identify dormant shares that should be closed. Treat exports as highly confidential.<br><br><strong>How it differs:</strong> <strong>Data share</strong> is for doing the share; this module is for <em>after-the-fact traceability</em>.
tour.mod.createTicket=<strong>About this module:</strong> <strong>Create ticket</strong> is the guided path to open a <em>brand-new dossier</em> when a case does not yet exist in the system.<br><br><strong>What the system does here:</strong> walks you through mandatory metadata (type, priority, direction, description…), attachments, and routing so the ticket is valid from the first save. A clean creation avoids rework and duplicate files.<br><br><strong>What you do as a user:</strong> gather facts before starting, write a clear summary, attach legible scans, choose the right category (wrong codes skew statistics), then submit and note the reference number you receive.<br><br><strong>How it differs:</strong> after creation, ongoing work happens in <strong>Ticket management</strong> or <strong>My work</strong>.
tour.mod.jobScheduler=<strong>About this module:</strong> the <strong>Task planner</strong> (job scheduler) is your <em>personal and team reminder system</em> for operational deadlines — separate from but complementary to ticket SLAs.<br><br><strong>What the system does here:</strong> stores planned tasks with due dates, can notify you before the deadline, and tracks whether something was still outstanding. It turns “I must not forget” into a system-visible commitment.<br><br><strong>What you do as a user:</strong> create entries for treaty dates, court returns, partner follow-ups, or periodic checks; set reminder offsets; assign colleagues if the workflow requires it; deactivate jobs that are obsolete.<br><br><strong>How it differs:</strong> a <strong>ticket</strong> is the dossier; a <strong>planner job</strong> is often a time-based obligation or nudge tied to your work.
tour.mod.missions=<strong>About this module:</strong> <strong>Missions</strong> covers <em>official travel and field deployments</em> — who goes where, when, with what means, and under which administrative cover (orders, vehicles, participants).<br><br><strong>What the system does here:</strong> structures mission records, participants, logistics fields, and may generate standard documents (e.g. mission orders). It supports accountability for movement of staff and resources.<br><br><strong>What you do as a user:</strong> create or update missions before and after movement, attach maps or instructions, ensure dates and participants match signed paperwork, and archive as required by your administration.<br><br><strong>How it differs:</strong> this is not a substitute for every operational ticket; it is specialised for <em>deployment / travel</em> processes.
tour.mod.myShift=<strong>About this module:</strong> <strong>My shift</strong> (or “My guard”) deals with <em>who is on duty</em> — shifts, attendance, or rostering, depending on how your organisation configured it.<br><br><strong>What the system does here:</strong> shows your assigned slots or team schedule, and may support acknowledgements or simple HR-related actions linked to presence.<br><br><strong>What you do as a user:</strong> confirm you are the person on shift, report swaps only through approved channels, and help supervisors see coverage gaps before they become service failures.<br><br><strong>How it differs:</strong> <strong>Agenda</strong> leans toward leave and calendar; <strong>My shift</strong> leans toward <em>duty rosters and presence</em>.
