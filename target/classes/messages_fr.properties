mail.ticket.created.directionInbound.body.internal=Bonjour,\n\nUn nouveau ticket a été enregistré pour la direction : {1}\nRéférence : {0}\nOrigine : saisie interne.\nAgent : {2}\nRésumé : {3}\n\nOuvrir la gestion des tickets :\n{4}\n\n— Message automatique SYSCO
