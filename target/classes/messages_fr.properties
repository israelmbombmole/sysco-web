mail.ticket.closed.requester.body=Bonjour {0},\n\nVotre ticket {1} est clôturé.\nRésumé : {2}\nClôturé par : {6}\n\nConsulter Mon activité :\n{3}\n\nConnexion à SYSCO :\n{4}\n\nLien du dossier (gestion des tickets) :\n{5}\n\nRéouverture : seuls les comptes dont le rôle est strictement supérieur à celui de l''agent ayant clôturé le ticket peuvent rouvrir le dossier dans la gestion des tickets après connexion.\n\n— Message automatique SYSCO
mail.ticket.closed.supervisor.subject=SYSCO — Ticket {0} clôturé (réouverture possible)
