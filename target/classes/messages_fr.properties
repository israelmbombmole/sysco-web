missions.assistant.guide=• \u00c9tape 1 — Harmonisez titre, lieu, dates, statut, responsable et objet avec l'ordre officiel.\n• \u00c9tape 2 — Dur\u00e9e, d\u00e9part/retour, transport et prise en charge des frais.\n• \u00c9tape 3 — Un agent = une liste (Messieurs ou Mesdames) ; le lead est ajout\u00e9 automatiquement si absent.\n• \u00c9tape 4 — Notes internes facultatives.\n• \u00c9tape 5 — R\u00e9f\u00e9rence, date d'\u00e9mission et signataire affinent le DOCX.
missions.assistant.topic.empty=Bienvenue. Posez une question pr\u00e9cise sur le formulaire (transport, dates, objet\u2026) ou utilisez une suggestion ci-dessous.
missions.assistant.topic.generic=Je peux r\u00e9pondre de fa\u00e7on cibl\u00e9e si vous pr\u00e9cisez le sujet :\n\u2022 transport et itin\u00e9raire multi-\u00e9tapes,\n\u2022 coh\u00e9rence des dates, du lieu et de la mention de dur\u00e9e,\n\u2022 r\u00e9daction de l\u0027objet / ordre,\n\u2022 participants ou frais,\n\u2022 r\u00e9f\u00e9rence et signataire de l\u0027ordonnance.\nReformulez en une phrase ou choisissez une suggestion.
missions.assistant.topic.transport.reply=Pour un trajet en plusieurs \u00e9tapes, le champ \u00ab Transport et itin\u00e9raire \u00bb doit permettre de suivre le d\u00e9roul\u00e9 sans ambigu\u00eft\u00e9.\n\nIndiquez dans l\u0027ordre chronologique :\n\u2022 lieu et jour (ou cr\u00e9neau) de d\u00e9part,\n\u2022 chaque \u00e9tape interm\u00e9diaire : ville ou site, motif court (contr\u00f4le, r\u00e9union, appui\u2026),\n\u2022 lieu de fin de mission ou de retour pr\u00e9vu,\n\u2022 moyen principal : v\u00e9hicule de service, transport public, taxi autoris\u00e9, etc.\n\u2022 si plusieurs v\u00e9hicules ou convoyeurs, pr\u00e9cisez-le.\n\nLes champs \u00ab Note d\u00e9part \u00bb et \u00ab Note retour \u00bb peuvent porter les horaires ou points de rendez-vous sans tout r\u00e9p\u00e9ter.\n\nAstuce : une ligne par \u00e9tape ou une liste num\u00e9rot\u00e9e reste lisible sur l\u0027ordre g\u00e9n\u00e9r\u00e9.
missions.assistant.prefill.transportDetail.template=Mission multi-\u00e9tapes — ordre indicatif du trajet (\u00e0 adapter \u00e0 votre ordre officiel) :\n\n1) D\u00e9part : {0} — le {1}\n2) \u00c9tape(s) interm\u00e9diaire(s) : (ville ou site, motif court, cr\u00e9neau si connu)\n3) Ex\u00e9cution principale li\u00e9e au site : {0}\n4) Retour pr\u00e9vu : le {2}\n\nMoyen : v\u00e9hicule de service / transport en commun / autre (\u00e0 pr\u00e9ciser).\nConvoyage ou restitution de mat\u00e9riel : (\u00e0 compl\u00e9ter si pertinent).
missions.assistant.prefill.departureNote.template=Rassemblement / d\u00e9part pr\u00e9vu le {0} (\u00e0 compl\u00e9ter : heure, lieu de prise en charge).
missions.assistant.prefill.returnNote.template=Retour pr\u00e9vu le {0} (\u00e0 compl\u00e9ter : heure, lieu de fin de mission).
missions.assistant.topic.dates.intro=V\u00e9rifications rapides sur votre saisie :
missions.assistant.topic.dates.badOrder=Attention : la date de fin ({1}) est avant la date de d\u00e9but ({0}). Corrigez les deux champs pour retrouver un ordre chronologique coh\u00e9rent.
missions.assistant.topic.dates.okRange=Les dates du {0} au {1} couvrent {2} jour(s) calendaires (inclus). V\u00e9rifiez que cela correspond bien \u00e0 la mission pr\u00e9vue.
missions.assistant.prefill.durationNote.fromDates=Dur\u00e9e indicative : {0} jour(s) calendaires (du d\u00e9but \u00e0 la fin inclus). \u00c0 ajuster si hors week-end/jours ouvr\u00e9s.
missions.assistant.topic.dates.durationHint=Si la mission s\u0027\u00e9tend sur plusieurs journ\u00e9es, compl\u00e9tez la \u00ab Mention dur\u00e9e \u00bb avec une formulation claire (ex. \u00ab 3 jours ouvr\u00e9s \u00bb ou \u00ab semaine du \u2026 \u00bb).
missions.assistant.topic.dates.needOtherDate=Vous n\u0027avez renseign\u00e9 qu\u0027une des deux dates : indiquez \u00e0 la fois la date de d\u00e9but et la date de fin (sauf mission sur une seule journ\u00e9e, avec la m\u00eame valeur si besoin).
missions.assistant.topic.dates.needDates=Renseignez la date de d\u00e9but et la date de fin pour tester la coh\u00e9rence avec le lieu et la dur\u00e9e.
missions.assistant.topic.dates.siteMissing=Le lieu principal (\u00ab Site \u00bb) est vide : renseignez-le pour que la mission soit identifiable sur l\u0027ordre.
missions.assistant.topic.dates.siteHint=Le \u00ab Site \u00bb doit refl\u00e9ter le lieu principal d\u0027ex\u00e9cution ; les autres escales appartiennent surtout au champ transport / notes.
missions.assistant.topic.dates.durationProvided=Votre mention de dur\u00e9e actuelle : \u00ab {0} \u00bb — assurez-vous qu\u0027elle colle aux dates et au type de mission (temps plein sur place, d\u00e9placements partiels, etc.).
missions.assistant.topic.subject.reply=L\u0027\u00ab Objet / mission \u00bb doit r\u00e9sumer en une ou deux phrases la finalit\u00e9 op\u00e9rationnelle : nature de l\u0027activit\u00e9 (contr\u00f4le, coordination\u2026), p\u00e9rim\u00e8tre utile, et rattachement si besoin.\n\nRestez align\u00e9 avec le titre et le site ; \u00e9vitez le jargon interne incompr\u00e9hensible sans glossaire.\n\nSch\u00e9ma possible : \u00ab Mission de [\u2026] relative \u00e0 [\u2026], au profit de [\u2026], sur la p\u00e9riode du [\u2026] au [\u2026]. \u00bb — adaptez avec vos informations r\u00e9elles (sans inventer de cadre hi\u00e9rarchique inconnu).
missions.assistant.prefill.objectives.template=Mission de terrain au profit de {1}, relative \u00e0 {0}, sur la p\u00e9riode du {2} au {3}. (\u00c0 pr\u00e9ciser : nature de l\u0027activit\u00e9 et r\u00e9sultats attendus.)
missions.assistant.topic.participants.reply=R\u00e8gle pratique : un agent ne doit figurer qu\u0027une seule fois, soit sous Messieurs soit sous Mesdames selon le libell\u00e9 officiel de l\u0027ordre.\n\nLe responsable de mission (lead) est r\u00e9tro-rempli automatiquement dans les listes si vous l\u0027omettez ; v\u00e9rifiez toutefois la coh\u00e9rence avec la signature et le corps de l\u0027ordonnance.\n\nPour de grandes \u00e9quipes, reproduisez l\u0027ordre d\u0027apparition ou le regroupement attendu par votre secr\u00e9tariat ; les notes internes peuvent pr\u00e9ciser la fonction de chacun si utile.
missions.assistant.topic.expenses.reply=Pr\u00e9cisez qui prend en charge quoi : frais de transport, h\u00e9bergement, indemnit\u00e9s kilom\u00e9triques, repas, frais engag\u00e9s par les agents\u2026\n\nEn cas de plafonds ou de proc\u00e9dures internes (note de frais, ordre de mission sign\u00e9 avant engagement), indiquez-le bri\u00e8vement pour \u00e9viter les erreurs de liquidation.\n\nSi tout est d\u00e9j\u00e0 d\u00e9crit sur l\u0027ordonnance officielle, vous pouvez renvoyer explicitement vers cette mention (\u00ab conform\u00e9ment \u00e0 l\u0027ordre \u2026 \u00bb).
missions.assistant.prefill.expensesNote.template=Frais et frais accessoires : prise en charge conform\u00e9ment aux dispositions applicables et au cadre fix\u00e9 par l\u0027ordonnance de mission (\u00e0 adapter selon votre dossier).
missions.assistant.topic.orderMeta.reply=Les champs \u00ab R\u00e9f\u00e9rence \u00bb, \u00ab Date d\u0027\u00e9mission \u00bb et \u00ab Signataire \u00bb permettent d\u0027aligner le DOCX g\u00e9n\u00e9r\u00e9 avec l\u0027acte administratif.\n\nRecopiez fid\u00e9lement la r\u00e9f\u00e9rence figurant sur le papier \u00e0 en-t\u00eate (num\u00e9ro / code dossier). La date d\u0027\u00e9mission doit correspondre \u00e0 la signature ; le signataire est celui qui engage la structure pour cette mission.\n\nLe corps de l\u0027ordonnance peut reprendre ou compl\u00e9ter l\u0027objet d\u00e9j\u00e0 saisi dans le formulaire principal.
missions.assistant.offlineBanner=Mode assistant intelligent hors ligne : r\u00e9ponses et suggestions selon votre question (transport, dates, objet\u2026). L\u0027IA conversationnelle en direct (OpenAI) n\u0027est pas configur\u00e9e sur ce serveur.
missions.assistant.adminHint=Optionnel : les administrateurs peuvent activer l'IA en direct via sysco.assistant.openai-api-key dans la configuration (mod\u00e8le : sysco.assistant.openai-model si besoin).
missions.assistant.aiUnavailableNotice=L'IA en direct est momentan\u00e9ment indisponible ; voici la liste de contr\u00f4le mission.
