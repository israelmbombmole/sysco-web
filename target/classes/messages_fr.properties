mail.ticket.created.requester.body=Bonjour {0},\n\nVotre demande a bien été enregistrée dans SYSCO.\nRéférence : {1}\nCatégorie : {2}\nRésumé : {3}\n\nVous pouvez suivre l''avancement depuis Mon activité :\n{4}\n\n— Message automatique SYSCO
