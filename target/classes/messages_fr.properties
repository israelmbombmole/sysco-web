tour.step.welcome.title=Bienvenue sur SYSCO Web
tour.step.welcome.body=<strong>\u00c0 quoi sert SYSCO Web :</strong> application web o\u00f9 votre service enregistre et suit le travail op\u00e9rationnel \u2014 dossiers (\u00ab tickets \u00bb), courrier physique, donn\u00e9es, \u00e9changes de fichiers, missions, plannings, etc. \u2014 pour que le travail soit visible, tra\u00e7able et accessible aux bonnes personnes.<br><br><strong>R\u00f4le de cette visite :</strong> elle explique l\u2019\u00e9cran principal, puis <em>chaque entr\u00e9e de menu que vous avez le droit de voir</em> : \u00e0 quoi sert ce module, ce que <em>l\u2019application y fait</em>, et ce que <em>vous</em> y faites concr\u00e8tement. Les boutons exacts peuvent varier selon le profil.<br><br><strong>Astuce :</strong> relancez la visite \u00e0 tout moment avec le bouton <strong>(i)</strong> Aide dans la barre du haut.
tour.step.header.title=Barre du haut (en-t\u00eate)
tour.step.header.body=<strong>\u00c0 quoi elle sert :</strong> acc\u00e8s rapide aux alertes et \u00e0 l\u2019identit\u00e9, sans ouvrir un module complet.<br><br><strong>Ce que fait chaque \u00e9l\u00e9ment :</strong><br>\u2022 <strong>Aide (i)</strong> \u2014 d\u00e9marre cette visite guid\u00e9e.<br>\u2022 <strong>Notifications</strong> \u2014 messages syst\u00e8me (ex. mises \u00e0 jour de tickets, discussion, rappels). Ouvrir une notification m\u00e8ne souvent au travail associ\u00e9.<br>\u2022 <strong>Discussion</strong> \u2014 \u00e9changes internes ; utile pour coordonner vite (les d\u00e9cisions officielles doivent aussi figurer sur le dossier ou la pi\u00e8ce).<br>\u2022 <strong>Votre nom</strong> \u2014 indique quel compte est actif ; v\u00e9rifiez-le avant toute action sensible.<br><br><strong>Important :</strong> utilisez <strong>D\u00e9connexion</strong> dans le menu lat\u00e9ral sur les postes partag\u00e9s pour que la personne suivante n\u2019agisse pas sous votre identit\u00e9.
tour.step.sidebar.title=Menu des modules (barre lat\u00e9rale)
tour.step.sidebar.body=<strong>\u00c0 quoi il sert :</strong> c\u2019est la carte des <strong>domaines m\u00e9tiers</strong> de SYSCO Web. Chaque ligne ouvre une partie diff\u00e9rente du syst\u00e8me.<br><br><strong>Ce que fait l\u2019application :</strong> n\u2019affiche que les modules que votre administrateur a autoris\u00e9s pour votre <em>r\u00f4le</em> et vos <em>permissions</em>. Un menu diff\u00e9rent de celui d\u2019un coll\u00e8gue est donc <em>normal</em>, ce n\u2019est pas une erreur.<br><br><strong>Comment l\u2019utiliser :</strong> cliquez sur un nom pour ouvrir le module ; la page en cours est surlign\u00e9e. Les \u00e9tapes suivantes d\u00e9crivent <strong>chaque lien que vous voyez ici</strong> en d\u00e9tail : objet, r\u00f4le du logiciel, t\u00e2ches types, et pour qui c\u2019est fait.
tour.step.help.title=Aide et visite guid\u00e9e
tour.step.help.body=<strong>Ce que fait ce bouton :</strong> relance la visite guid\u00e9e depuis le d\u00e9but \u2014 utile apr\u00e8s une formation ou si vous oubliez l\u2019utilit\u00e9 d\u2019un module.<br><br><strong>Ce que vous verrez :</strong> \u00e0 chaque \u00e9tape, un encadr\u00e9 explique la zone mise en avant. Pour les modules, le texte pr\u00e9cise <strong>\u00e0 quoi le module sert</strong>, <strong>ce que l\u2019application y fait</strong>, et <strong>les actions concr\u00e8tes</strong> des utilisateurs.<br><br><strong>Remarque :</strong> terminer ou fermer la visite peut enregistrer que l\u2019int\u00e9gration est faite pour votre compte (selon l\u2019organisation).

tour.mod.generic=<strong>\u00c0 propos de ce module :</strong> il s\u2019agit d\u2019un <strong>domaine m\u00e9tier</strong> SYSCO \u2014 une zone d\u00e9di\u00e9e \u00e0 un type de travail (donn\u00e9es, dossiers, courrier, etc.).<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> il stocke, liste et traite l\u2019information de ce p\u00e9rim\u00e8tre : formulaires, tableaux, recherches et workflows d\u00e9finis par votre administration.<br><br><strong>Ce que vous faites :</strong> ouvrez-le depuis le menu, puis utilisez les \u00e9crans pour cr\u00e9er, consulter ou mettre \u00e0 jour selon vos proc\u00e9dures. Filtres et boutons d\u00e9pendent des droits (certains profils ne font que lire).<br><br><strong>Astuce :</strong> si vous ne savez pas quel module choisir, demandez \u00e0 votre responsable quel processus correspond \u00e0 ce nom de menu.
tour.mod.dashboard=<strong>\u00c0 propos de ce module :</strong> le <strong>Tableau de bord</strong> est la page d\u2019<em>accueil</em> apr\u00e8s connexion. Il donne une vue d\u2019ensemble rapide ; il ne remplace pas les listes d\u00e9taill\u00e9es ailleurs.<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> agr\u00e8ge indicateurs et raccourcis (compteurs, alertes, liens) pour voir d\u2019un coup d\u2019\u0153il si la charge, les d\u00e9lais ou certains domaines m\u00e9ritent attention. Le contenu exact d\u00e9pend de la configuration et de vos acc\u00e8s.<br><br><strong>Ce que vous faites :</strong> commencez la journ\u00e9e ici ; parcourez les tuiles ou chiffres cl\u00e9s ; ouvrez ensuite <strong>Mon travail</strong>, <strong>Gestion des tickets</strong>, <strong>Courrier</strong>, etc. pour agir sur un dossier complet.<br><br><strong>Diff\u00e9rence avec d\u2019autres modules :</strong> il <em>synth\u00e9tise</em> ; les modules Tickets ou Courrier contiennent les dossiers et actions d\u00e9taill\u00e9es.
tour.mod.dataEntry=<strong>\u00c0 propos de ce module :</strong> la <strong>Saisie des donn\u00e9es</strong> sert \u00e0 la <em>captation structur\u00e9e</em> d\u2019informations op\u00e9rationnelles \u2014 faits et chiffres que l\u2019institution doit enregistrer de fa\u00e7on uniforme (d\u00e9clarations, contr\u00f4les, statistiques, registres\u2026).<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> pr\u00e9sente les donn\u00e9es en lignes/colonnes (ou \u00e9quivalent), contr\u00f4le les champs obligatoires et formats, enregistre en base pour statistiques et audit. Des pi\u00e8ces peuvent souvent \u00eatre jointes \u00e0 une ligne lorsque le processus l\u2019exige.<br><br><strong>Ce que vous faites :</strong> cr\u00e9ez des lignes, corrigez sous votre responsabilit\u00e9, enregistrez, importez par lots si un mod\u00e8le Excel agr\u00e9\u00e9 existe. Respectez le mod\u00e8le et les messages d\u2019erreur \u2014 ils \u00e9vitent des donn\u00e9es fausses pour tout le service.<br><br><strong>Diff\u00e9rence :</strong> saisie courante ici ; gros assainissements et imports souvent dans <strong>Gestion des donn\u00e9es</strong>.
tour.mod.courier=<strong>\u00c0 propos de ce module :</strong> le <strong>portail Courrier</strong> concerne les <em>mouvements physiques</em> \u2014 plis, sacoches, colis, transferts internes \u2014 tout ce qui doit avoir une <strong>cha\u00eene de custody</strong> claire, comme un courrier recommand\u00e9.<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> enregistre chaque objet avec ses r\u00e9f\u00e9rences (code-barres, n\u00b0 de registre\u2026), le d\u00e9tenteur actuel, le statut (re\u00e7u, en transit, livr\u00e9\u2026) et l\u2019historique des passages. Objectif : r\u00e9pondre \u00ab o\u00f9 est ce pli et qui l\u2019avait en dernier ? \u00bb pour toute personne habilit\u00e9e.<br><br><strong>Ce que vous faites :</strong> enregistrez les r\u00e9ceptions, saisissez ou scannez les identifiants, attribuez le prochain gestionnaire, confirmez la livraison, notez les anomalies (d\u00e9g\u00e2t, refus, \u00e9cart). L\u2019\u00e9tat num\u00e9rique doit coller \u00e0 la r\u00e9alit\u00e9 \u2014 ne marquez pas \u00ab livr\u00e9 \u00bb si le colis est encore sur votre bureau.<br><br><strong>Diff\u00e9rence :</strong> les op\u00e9rationnels utilisent ce portail ; <strong>Gestion courrier</strong> sert au pilotage et \u00e0 la vision \u00e9largie.
tour.mod.courierManagement=<strong>\u00c0 propos de ce module :</strong> la <strong>Gestion courrier</strong> est la vue <em>superviseur</em> des flux de courrier physique \u2014 pour ceux qui doivent fluidifier le travail entre bureaux ou \u00e9quipes.<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> affiche des listes plus larges, des chronologies et des outils pour rep\u00e9rer retards, surcharges ou plis bloqu\u00e9s ; permet r\u00e9affectations ou escalades selon vos r\u00e8gles. Les donn\u00e9es sont les m\u00eames que dans le portail, mais l\u2019angle est celui du management.<br><br><strong>Ce que vous faites :</strong> surveillez d\u00e9lais et vieillissement, r\u00e9\u00e9quilibrez la charge, enqu\u00eatez sur les incidents, donnez de la visibilit\u00e9 \u00e0 la direction. Profils types : directions, inspection, secr\u00e9tariat \u2014 selon configuration.<br><br><strong>Diff\u00e9rence :</strong> le terrain utilise <strong>Courrier</strong> pour la manipulation ; ce module sert au <em>contr\u00f4le et \u00e0 la correction \u00e0 grande \u00e9chelle</em>.
tour.mod.dataManagement=<strong>\u00c0 propos de ce module :</strong> la <strong>Gestion des donn\u00e9es</strong> sert \u00e0 <em>piloter les jeux de donn\u00e9es</em> : listes de r\u00e9f\u00e9rence, imports de masse, corrections coordonn\u00e9es, r\u00e9conciliation lorsque beaucoup de lignes doivent changer \u00e0 la fois.<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> prend en charge des op\u00e9rations administratives sur les donn\u00e9es (imports, mises \u00e0 jour, parfois exports) avec des garde-fous pour que statistiques et traitements en aval restent coh\u00e9rents. Une erreur ici fausse les tableaux de bord de tous.<br><br><strong>Ce que vous faites :</strong> lancez ou contr\u00f4lez des imports, validez des \u00e9chantillons, corrigez codes et intitul\u00e9s, alignez sur le papier ou des sources externes, documentez les changements majeurs. Permission en g\u00e9n\u00e9ral r\u00e9serv\u00e9e au personnel form\u00e9 et de confiance.<br><br><strong>Diff\u00e9rence :</strong> la <strong>Saisie</strong> est pour la capture quotidienne ligne \u00e0 ligne ; ce module est pour le <em>volume</em> et la <em>maintenance</em> des donn\u00e9es.
tour.mod.dataShare=<strong>\u00c0 propos de ce module :</strong> le <strong>Partage des donn\u00e9es</strong> permet d\u2019envoyer fichiers ou extraits contr\u00f4l\u00e9s \u00e0 quelqu\u2019un d\u2019autre <em>via l\u2019application</em>, selon vos r\u00e8gles de s\u00e9curit\u00e9 \u2014 plut\u00f4t que messagerie personnelle ou cl\u00e9s USB non ma\u00eetris\u00e9es.<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> trace qui a partag\u00e9 quoi, avec qui, souvent avec date limite ou mot de passe \u00e0 usage unique (OTP), pour pouvoir auditer et r\u00e9voquer. Cela limite les copies \u00ab invisibles \u00bb de documents sensibles.<br><br><strong>Ce que vous faites :</strong> cr\u00e9ez un partage, choisissez le destinataire et le p\u00e9rim\u00e8tre, respectez la politique pour les donn\u00e9es personnelles ou classifi\u00e9es, pr\u00e9venez le destinataire par un canal agr\u00e9\u00e9, puis <strong>r\u00e9voquez</strong> l\u2019acc\u00e8s quand la collaboration est termin\u00e9e.<br><br><strong>Diff\u00e9rence :</strong> <strong>Gestion du partage de fichiers</strong> et <strong>Audit partage fichiers</strong> sont plut\u00f4t administration et enqu\u00eate ; ce module sert au <em>m\u00e9tier qui initie et suit</em> les partages.
tour.mod.myActivity=<strong>\u00c0 propos de ce module :</strong> <strong>Mon activit\u00e9</strong> est votre <em>journal personnel</em> dans SYSCO \u2014 mouvements et actions li\u00e9s \u00e0 <strong>vous</strong>, pas \u00e0 toute l\u2019institution.<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> liste r\u00e9cemment tickets, fusions ou autres \u00e9v\u00e9nements auxquels vous avez particip\u00e9, pour reconstituer \u00ab qu\u2019ai-je fait la semaine derni\u00e8re ? \u00bb sans interroger toute la base.<br><br><strong>Ce que vous faites :</strong> consultez votre fil avant une passation, pr\u00e9parez une r\u00e9ponse \u00e0 l\u2019audit, retrouvez un dossier dont vous vous souvenez. C\u2019est une aide-m\u00e9moire ; la v\u00e9rit\u00e9 officielle du dossier reste l\u2019historique du ticket lui-m\u00eame.<br><br><strong>Diff\u00e9rence :</strong> <strong>Mon travail</strong> montre ce qui <em>attend votre action</em> ; <strong>Mon activit\u00e9</strong> montre ce que vous avez <em>d\u00e9j\u00e0 fait</em>.
tour.mod.myWork=<strong>\u00c0 propos de ce module :</strong> <strong>Mon travail</strong> est votre file d\u2019<em>attente personnelle</em> \u2014 tickets (et t\u00e2ches li\u00e9es) qui vous sont assign\u00e9s ou qui n\u00e9cessitent votre d\u00e9cision.<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> r\u00e9duit la masse des dossiers ouverts \u00e0 \u00ab ce qui me concerne maintenant \u00bb, souvent tri\u00e9 par priorit\u00e9, date ou statut. C\u2019est souvent le point d\u2019entr\u00e9e quotidien des agents.<br><br><strong>Ce que vous faites :</strong> traitez les dossiers du plus ancien ou du plus urgent, ouvrez le ticket, documentez votre d\u00e9cision en commentaire, joignez les preuves, faites avancer le statut si le processus le permet, escaladez si vous \u00eates bloqu\u00e9, fusionnez les doublons si vous \u00eates form\u00e9.<br><br><strong>Diff\u00e9rence :</strong> le <strong>Suivi des tickets</strong> voit une <em>vision \u00e9largie</em> pour une \u00e9quipe ; <strong>Mon travail</strong> met <em>vos</em> affectations en premier.
tour.mod.ticketMonitoring=<strong>\u00c0 propos de ce module :</strong> le <strong>Suivi des tickets</strong> sert aux <em>superviseurs</em> qui doivent surveiller de nombreux dossiers \u2014 arri\u00e9r\u00e9s, risques, d\u00e9lais et escalades au niveau d\u2019une \u00e9quipe ou direction.<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> propose des listes et filtres (statut, \u00e2ge, priorit\u00e9, direction\u2026) pour d\u00e9tecter les goulots d\u2019\u00e9tranglement, redistribuer le travail ou intervenir avant rupture des d\u00e9lais. C\u2019est une \u00ab tour de contr\u00f4le \u00bb du stock de dossiers.<br><br><strong>Ce que vous faites :</strong> appliquez des filtres, rep\u00e9rez les anomalies (tr\u00e8s vieux tickets, escalades r\u00e9p\u00e9t\u00e9es), ouvrez le d\u00e9tail au besoin, coordonnez les affectations et les circuits d\u2019escalade. Vous voyez la for\u00eat ; le terrain vit souvent dans <strong>Mon travail</strong> ou un seul dossier.<br><br><strong>Diff\u00e9rence :</strong> la <strong>Gestion des tickets</strong> approfondit <em>un</em> dossier ; le suivi donne l\u2019<em>ampleur</em> et la <em>supervision</em>.
tour.mod.ticketManagement=<strong>\u00c0 propos de ce module :</strong> la <strong>Gestion des tickets</strong> est le c\u0153ur du <em>dossier m\u00e9tier</em> \u2014 un ticket est un dossier op\u00e9rationnel (contr\u00f4le, demande, instruction\u2026) avec un cycle de vie jusqu\u2019\u00e0 la cl\u00f4ture.<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> conserve champs structur\u00e9s, commentaires libres, pi\u00e8ces jointes, t\u00e2ches, changements de statut, liens vers le courrier ou autres artefacts, et une piste d\u2019audit. C\u2019est la r\u00e9f\u00e9rence pour \u00ab qu\u2019est-il arriv\u00e9 sur ce dossier dans SYSCO ? \u00bb.<br><br><strong>Ce que vous faites :</strong> ouvrez un ticket depuis une liste, lisez l\u2019historique, mettez \u00e0 jour les faits, participez \u00e0 la revue de cl\u00f4ture, t\u00e9l\u00e9versez PDF ou scans, reliez des dossiers li\u00e9s, respectez votre PG pour l\u2019escalade. La qualit\u00e9 des commentaires aide coll\u00e8gues et audits.<br><br><strong>Diff\u00e9rence :</strong> <strong>Cr\u00e9er un ticket</strong> ouvre seulement de <em>nouveaux</em> dossiers ; ce module g\u00e8re le <em>traitement et la cl\u00f4ture</em>.
tour.mod.fileShareManagement=<strong>\u00c0 propos de ce module :</strong> la <strong>Gestion du partage de fichiers</strong> est une <em>porte d\u2019administration</em> sur les \u00e9changes sensibles de documents \u2014 qui peut recevoir quoi, et sous quelles conditions.<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> met en file les demandes, enregistre les d\u00e9cisions (accepter / refuser / ajuster), et offre une vue d\u2019ensemble des partages actifs. Cela prot\u00e8ge l\u2019organisme contre la diffusion incontr\u00f4l\u00e9e.<br><br><strong>Ce que vous faites :</strong> examinez les demandes au regard de la politique, motivez la d\u00e9cision, r\u00e9voquez si n\u00e9cessaire, faites appel \u00e0 la s\u00e9curit\u00e9 ou au juridique en cas de doute. Un cercle tr\u00e8s restreint doit avoir ce module.<br><br><strong>Diff\u00e9rence :</strong> le m\u00e9tier utilise <strong>Partage des donn\u00e9es</strong> pour initier ; ce module sert \u00e0 la <em>gouvernance et \u00e0 l\u2019approbation</em>.
tour.mod.userManagement=<strong>\u00c0 propos de ce module :</strong> la <strong>Gestion des utilisateurs</strong> d\u00e9finit <em>qui existe dans le syst\u00e8me</em> : comptes, mots de passe, r\u00f4les et modules accessibles.<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> cr\u00e9e et d\u00e9sactive les connexions, associe les personnes aux r\u00f4les (directeur, inspecteur, secr\u00e9taire\u2026) et aux permissions fines (lecture/\u00e9criture par domaine). C\u2019est le levier principal du <em>moindre privil\u00e8ge</em>.<br><br><strong>Ce que vous faites :</strong> int\u00e9grez les nouveaux agents apr\u00e8s validation RH, d\u00e9bloquez les comptes, adaptez les droits quand les fonctions changent, d\u00e9sactivez sans d\u00e9lai les d\u00e9parts, ne partagez jamais un compte administrateur. Chaque changement doit reposer sur une d\u00e9cision trac\u00e7able.<br><br><strong>Risque :</strong> une erreur peut exposer des donn\u00e9es personnelles ou des secrets op\u00e9rationnels \u2014 v\u00e9rifiez avant d\u2019enregistrer.
tour.mod.agenda=<strong>\u00c0 propos de ce module :</strong> l\u2019<strong>Agenda</strong> (et cong\u00e9s) couvre la <em>planification du temps</em> : pr\u00e9sences, absences, disponibilit\u00e9, pour que le service soit couvert.<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> selon configuration, affiche calendriers, demandes de cong\u00e9, validations, ou visibilit\u00e9 d\u2019\u00e9quipe. Il relie la r\u00e9alit\u00e9 RH \u00e0 l\u2019organisation du travail.<br><br><strong>Ce que vous faites :</strong> d\u00e9posez des absences, validez ou refusez en tant que manager, v\u00e9rifiez la couverture avant les pics d\u2019activit\u00e9, tenez les dates \u00e0 jour pour que les coll\u00e8gues sachent qui joindre.<br><br><strong>Remarque :</strong> les \u00e9crans peuvent varier ; suivez les consignes locales pour jours f\u00e9ri\u00e9s et types de cong\u00e9 obligatoires.
tour.mod.loginAudit=<strong>\u00c0 propos de ce module :</strong> le <strong>Journal des connexions</strong> enregistre les <em>\u00e9v\u00e9nements d\u2019authentification</em> \u2014 tentatives de connexion \u00e0 SYSCO Web et m\u00e9tadonn\u00e9es utiles aux enqu\u00eates de s\u00e9curit\u00e9.<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> conserve une trace (qui, quand, dans quel contexte technique lorsque disponible) pour analyser abus, vol d\u2019identifiants ou manquements aux r\u00e8gles.<br><br><strong>Ce que vous faites :</strong> filtrez par utilisateur et p\u00e9riode, exportez pour proc\u00e9dure formelle si autoris\u00e9, corr\u00e9lez avec acc\u00e8s physique ou RH. Pas pour la curiosit\u00e9 \u2014 acc\u00e8s restreint et sensible juridiquement.<br><br><strong>Diff\u00e9rence :</strong> il s\u2019agit des <em>connexions \u00e0 l\u2019application</em> ; l\u2019historique d\u2019un ticket concerne le <em>travail sur le dossier</em>.
tour.mod.fileShareAudit=<strong>\u00c0 propos de ce module :</strong> l\u2019<strong>Audit partage fichiers</strong> est la <em>piste d\u2019enqu\u00eate</em> sur les partages de documents \u2014 preuve de qui a envoy\u00e9 quoi \u00e0 qui et quand.<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> centralise les \u00e9v\u00e9nements li\u00e9s aux partages (cr\u00e9ation, t\u00e9l\u00e9chargement, r\u00e9vocation si journalis\u00e9) pour r\u00e9pondre aux autorit\u00e9s de contr\u00f4le ou aux audits internes.<br><br><strong>Ce que vous faites :</strong> recherchez apr\u00e8s incident, constituez des dossiers de preuve, identifiez les partages dormants \u00e0 fermer. Traitez les exports comme hautement confidentiels.<br><br><strong>Diff\u00e9rence :</strong> <strong>Partage des donn\u00e9es</strong> sert \u00e0 <em>faire</em> le partage ; ce module sert \u00e0 la <em>tra\u00e7abilit\u00e9 a posteriori</em>.
tour.mod.createTicket=<strong>\u00c0 propos de ce module :</strong> <strong>Cr\u00e9er un ticket</strong> est le parcours guid\u00e9 pour ouvrir un <em>nouveau dossier</em> lorsqu\u2019il n\u2019existe pas encore dans le syst\u00e8me.<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> vous fait remplir les m\u00e9tadonn\u00e9es obligatoires (type, priorit\u00e9, direction, r\u00e9sum\u00e9\u2026), pi\u00e8ces jointes et routage afin que le premier enregistrement soit d\u00e9j\u00e0 exploitable. Une cr\u00e9ation propre \u00e9vite doubles dossiers et reprises.<br><br><strong>Ce que vous faites :</strong> rassemblez les faits avant de commencer, r\u00e9digez un r\u00e9sum\u00e9 clair, joignez des scans lisibles, choisissez la bonne cat\u00e9gorie (un mauvais code fausse les statistiques), validez et notez la r\u00e9f\u00e9rence du dossier cr\u00e9\u00e9.<br><br><strong>Diff\u00e9rence :</strong> apr\u00e8s cr\u00e9ation, le suivi se poursuit dans <strong>Gestion des tickets</strong> ou <strong>Mon travail</strong>.
tour.mod.jobScheduler=<strong>\u00c0 propos de ce module :</strong> le <strong>Planificateur de t\u00e2ches</strong> est votre syst\u00e8me de <em>rappels et d\u2019\u00e9ch\u00e9ances</em> pour le travail op\u00e9rationnel \u2014 en compl\u00e9ment des d\u00e9lais port\u00e9s par les tickets.<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> enregistre des t\u00e2ches planifi\u00e9es avec dates d\u2019\u00e9ch\u00e9ance, peut vous pr\u00e9venir avant l\u2019\u00e9ch\u00e9ance, et suit ce qui restait \u00e0 faire. Cela formalise les \u00ab je ne dois pas oublier \u00bb.<br><br><strong>Ce que vous faites :</strong> cr\u00e9ez des entr\u00e9es pour dates contractuelles, retours de justice, relances partenaires ou contr\u00f4les p\u00e9riodiques ; r\u00e9glez les rappels ; affectez un coll\u00e8gue si le processus l\u2019exige ; d\u00e9sactivez les t\u00e2ches devenues sans objet.<br><br><strong>Diff\u00e9rence :</strong> le <strong>ticket</strong> est le dossier ; une <strong>t\u00e2che planifi\u00e9e</strong> est souvent une obligation temporelle ou un coup de sonnette li\u00e9 au travail.
tour.mod.missions=<strong>\u00c0 propos de ce module :</strong> <strong>Missions</strong> couvre les <em>d\u00e9placements et d\u00e9ploiements officiels sur le terrain</em> : participants, moyens, v\u00e9hicules, dates, et souvent documents types (ordres de mission).<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> structure les fiches de mission, participants, champs logistiques, et peut g\u00e9n\u00e9rer des documents administratifs standards. Cela soutient la responsabilit\u00e9 sur les d\u00e9placements d\u2019agents et de moyens.<br><br><strong>Ce que vous faites :</strong> cr\u00e9ez ou mettez \u00e0 jour les missions avant/apr\u00e8s d\u00e9placement, joignez consignes ou plans, v\u00e9rifiez coh\u00e9rence avec les signatures papier, archivez selon les r\u00e8gles de votre administration.<br><br><strong>Diff\u00e9rence :</strong> ce n\u2019est pas un substitut \u00e0 tous les tickets m\u00e9tiers ; c\u2019est sp\u00e9cialis\u00e9 pour les processus <em>d\u00e9placement / terrain</em>.
tour.mod.myShift=<strong>\u00c0 propos de ce module :</strong> <strong>Ma garde</strong> traite <em>qui est de service</em> \u2014 cr\u00e9neaux, pr\u00e9sences, ou planning type emploi du temps, selon la configuration.<br><br><strong>Ce que fait le syst\u00e8me ici :</strong> affiche vos cr\u00e9neaux ou ceux de l\u2019\u00e9quipe, et peut permettre des accus\u00e9s de r\u00e9ception ou actions simples li\u00e9es \u00e0 la pr\u00e9sence.<br><br><strong>Ce que vous faites :</strong> confirmez que vous \u00eates bien le titulaire de garde, ne modifiez les \u00e9changes d\u2019horaires qu\u2019via les circuits agr\u00e9\u00e9s, aidez les superviseurs \u00e0 voir les trous de couverture avant qu\u2019ils n\u2019impactent le service.<br><br><strong>Diff\u00e9rence :</strong> l\u2019<strong>Agenda</strong> penche vers cong\u00e9s et calendrier ; <strong>Ma garde</strong> penche vers <em>fiches de garde et pr\u00e9sence op\u00e9rationnelle</em>.
