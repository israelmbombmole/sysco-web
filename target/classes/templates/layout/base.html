<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout (title, section)"
      th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta sec:authorize="isAuthenticated()" th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}"/>
    <meta sec:authorize="isAuthenticated()" th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}"/>
    <th:block th:replace="${title}"/>
    <link rel="stylesheet" th:href="@{/css/sysco-theme.css(v='formation-banner')}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css"/>
    <link sec:authorize="isAuthenticated()" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.css"/>
</head>
<body class="sysco-body sysco-app-shell"
      th:data-sysco-auto-tour="${syscoAutoStartTour}"
      th:data-sysco-username="${#authentication != null ? #authentication.name : ''}"
      th:data-tour-complete-url="@{/app/help/tutorial-completed}">
<!-- JSON must not live in <script>…</script>: a "]]>" or "</script>" in content breaks the page; textarea + th:text is safe. -->
<textarea sec:authorize="isAuthenticated()" id="sysco-tour-payload" class="sr-only" aria-hidden="true" readonly tabindex="-1" cols="1" rows="1" th:text="${tourGuidePayloadJson}">{}</textarea>
<div id="sysco-upload-i18n" class="sr-only" aria-hidden="true"
     th:data-drop-title="#{upload.dropTitle}"
     th:data-drop-hint="#{upload.dropHint}"
     th:data-empty="#{upload.fileListEmpty}"
     th:data-remove-aria="#{upload.removeAria}"></div>
<div class="app-root">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <div class="app-main-column">
        <div th:if="${syscoFormationMode}"
             class="sysco-banner-warn sysco-formation-env-banner"
             role="status"
             th:text="#{layout.formationBanner}">
            Training environment
        </div>
        <header th:replace="~{fragments/header :: header}"></header>
        <main class="main-content-surface">
            <th:block th:replace="${section}"/>
        </main>
    </div>
</div>
<button type="button" class="floating-chat" th:title="#{header.chatAria}">
    <span class="floating-chat-icon" aria-hidden="true">&#128172;</span>
    <span class="floating-chat-badge"
          th:if="${headerUnreadChat > 0}"
          th:text="${headerUnreadChat}">0</span>
</button>
<form th:action="@{/logout}" method="post" id="syscoLogoutForm" style="display:none;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
</form>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/fr.js"></script>
<script th:src="@{/js/sysco-datepicker.js}"></script>
<script th:src="@{/js/upload-enhancer.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
<script th:src="@{/js/realtime-hub.js}"></script>
<script sec:authorize="isAuthenticated()" src="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.js.iife.js"></script>
<script sec:authorize="isAuthenticated()" th:src="@{/js/sysco-guided-tour.js}"></script>
</body>
</html>
