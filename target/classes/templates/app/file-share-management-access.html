<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
    <title th:fragment="title" th:text="#{fileShareMgmt.access.title}">Access</title>
</head>
<body>
<section th:fragment="section" class="gov-work-page file-share-management-access-page">
    <div class="card page-panel file-share-mgmt-shell">
        <h1 class="title-large" th:text="#{fileShareMgmt.access.title}">Accès gestion partage fichiers</h1>
        <p class="muted form-hint" th:text="#{fileShareMgmt.access.intro}">
            Demandez l’accès à l’administrateur de votre direction. Après génération du code, saisissez-le ci-dessous.
        </p>
        <div class="page-alerts" th:if="${accessBannerKey != null or successKey != null or errorKey != null}">
            <p class="login-error" th:if="${accessBannerKey != null}" th:text="#{__${accessBannerKey}__}">Expired.</p>
            <p class="success-banner" th:if="${successKey != null}" th:text="#{__${successKey}__}">OK.</p>
            <p class="login-error" th:if="${errorKey != null}" th:text="#{__${errorKey}__}">Error.</p>
        </div>

        <h3 class="courier-subheading" th:text="#{fileShareMgmt.access.requestHeading}">Demande</h3>
        <form method="post" th:action="@{/app/file-share-management/access/request}" class="inline-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="primary-btn" th:text="#{fileShareMgmt.access.requestBtn}">Demander l’accès</button>
        </form>

        <h3 class="courier-subheading" th:text="#{fileShareMgmt.access.verifyHeading}">Code OTP</h3>
        <p class="muted form-hint" th:text="#{fileShareMgmt.access.verifyHint}">
            Le code est envoyé dans vos notifications après validation par l’administrateur.
        </p>
        <form method="post" th:action="@{/app/file-share-management/access/verify}" class="data-share-filter-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <label class="form-label" for="fsmAccessOtp" th:text="#{fileShareMgmt.access.otpLabel}">OTP</label>
            <input id="fsmAccessOtp" class="form-input" type="text" name="otp" autocomplete="one-time-code" required
                   th:placeholder="#{fileShareMgmt.access.otpPlaceholder}"/>
            <button type="submit" class="primary-btn" th:text="#{fileShareMgmt.access.verifyBtn}">Valider</button>
        </form>

        <p class="muted form-hint" th:text="#{fileShareMgmt.access.sessionHint(${sessionMinutesDefault})}">Hint</p>
    </div>
</section>
</body>
</html>
