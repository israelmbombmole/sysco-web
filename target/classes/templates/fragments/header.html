<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header class="top-bar" th:fragment="header">
    <span class="app-brand" th:text="#{app.title}">SYSCO</span>
    <span class="top-meta">
        <span class="header-actions" sec:authorize="isAuthenticated()">
            <button type="button" id="sysco-help-tour-btn" class="header-icon-link header-help-tour-btn"
                    th:title="#{header.guidedTourHelp}" th:attr="aria-label=#{header.guidedTourHelp}">
                <span class="header-icon" aria-hidden="true">&#9432;</span>
            </button>
            <a th:href="@{/app/notifications}"
               class="header-icon-link header-notif-link"
               th:title="#{header.notificationsAria}">
                <span class="header-icon" aria-hidden="true">&#128276;</span>
                <span class="header-badge header-notif-badge"
                      th:if="${headerUnreadNotifications > 0}"
                      th:text="${headerUnreadNotifications}">0</span>
            </a>
            <a th:href="@{/app/chat}"
               class="header-icon-link header-chat-link"
               th:title="#{header.chatAria}">
                <span class="header-icon" aria-hidden="true">&#128172;</span>
                <span class="header-badge header-chat-badge"
                      th:if="${headerUnreadChat > 0}"
                      th:text="${headerUnreadChat}">0</span>
            </a>
        </span>
        <span sec:authorize="isAuthenticated()" th:text="${headerDisplayUsername}">user</span>
    </span>
</header>
</body>
</html>
