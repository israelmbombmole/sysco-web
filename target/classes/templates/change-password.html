<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="#{changePassword.title}">Change password</title>
    <link rel="stylesheet" th:href="@{/css/sysco-theme.css}"/>
</head>
<body class="sysco-body">
<div class="login-wrap">
    <div class="login-card">
        <h1 th:text="#{changePassword.title}">Change password</h1>
        <p class="muted" th:if="${param.required}" th:text="#{changePassword.required}">
            You must change your password before continuing.
        </p>
        <div class="login-error" th:if="${changePasswordError}" th:text="#{changePassword.error}">
            Invalid password.
        </div>
        <form th:action="@{/change-password}" method="post">
            <div class="login-field">
                <label for="newPassword" th:text="#{changePassword.new}">New password</label>
                <input id="newPassword" name="newPassword" type="password" minlength="6" required/>
            </div>
            <div class="login-field">
                <label for="confirmPassword" th:text="#{changePassword.confirm}">Confirm password</label>
                <input id="confirmPassword" name="confirmPassword" type="password" minlength="6" required/>
            </div>
            <div class="login-actions">
                <button type="submit" class="primary-btn btn-block" th:text="#{changePassword.submit}">Save</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
